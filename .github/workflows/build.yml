name: build
on:
  pull_request:
    branches:
      - "main"

jobs:
  # Existing Jekyll build job – kept intact during the migration parallel phase.
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Cache math SVGs
        uses: actions/cache@v4
        with:
          path: .jekyll-cache/math-svg
          key: math-svg-v2-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            math-svg-v2-${{ runner.os }}-${{ github.ref_name }}-
            math-svg-v2-${{ runner.os }}-
            
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install platform dependencies
        run: |
          sudo apt-get install libgsl-dev
  
      - uses: ruby/setup-ruby@v1
        with:
          # runs 'bundle install' and caches installed gems automatically
          bundler-cache: true
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Build
        run: |
          ./scripts/build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Laika/Scala build validation job – added as part of migration workstream W0.5.
  # Runs on every PR alongside the Jekyll job; does NOT deploy output.
  laika-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Scala-CLI build artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/scala-cli
          key: scala-cli-${{ runner.os }}-${{ hashFiles('build.scala', 'src/**/*.scala') }}
          restore-keys: |
            scala-cli-${{ runner.os }}-

      - name: Install Scala CLI
        uses: VirtusLab/scala-cli-setup@v1

      - name: Laika build (validation only)
        run: |
          scala-cli run build.scala src/ -- build --out _site-laika
